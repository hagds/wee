<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Discord Bot</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #6a0dad, #3b0a75);
            color: white;

            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .hero {
            text-align: center;
            max-width: 800px;
            padding: 40px;
        }

        .top-tag {
            font-size: 14px;
            opacity: 0.8;
            margin-bottom: 10px;
        }

        h1 {
            font-size: 50px;
            margin: 10px 0;
        }

        p {
            font-size: 18px;
            opacity: 0.9;
        }

        .bot {
            font-size: 70px;
            margin: 20px 0;
        }

        .features {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin: 30px 0;
        }

        .card {
            background: rgba(255, 255, 255, 0.12);
            padding: 12px;
            border-radius: 10px;
        }

        .btn {
            display: inline-block;
            padding: 12px 25px;
            background: #ffcc00;
            color: black;
            font-weight: bold;
            text-decoration: none;
            border-radius: 8px;
            margin-top: 20px;
            transition: 0.3s;
        }

        .btn:hover {
            transform: scale(1.05);
        }

        .footer {
            margin-top: 25px;
            font-size: 14px;
            opacity: 0.8;
        }
    </style>
</head>

<body>

<div class="hero">

    <div class="top-tag">POWERFUL • FAST • RELIABLE</div>

    <h1>DISCORD BOT</h1>

    <p>The All-in-One Discord Bot for Your Server</p>

    <div class="bot">🤖</div>

    <div class="features">
        <div class="card">🛡 Moderation</div>
        <div class="card">🎟 Ticket System</div>
        <div class="card">🎁 Giveaway</div>
        <div class="card">🚫 Anti-Raid</div>
        <div class="card">📊 Server Stats</div>
        <div class="card">⚙ Customizable</div>
    </div>

    <a class="btn" href="https://discord.com/oauth2/authorize?client_id=1507034751578406982&permissions=0&integration_type=0&scope=bot+applications.commands">
        INVITE BOT
    </a>

    <div class="footer">
        Developed by <b>ANURAG</b>
    </div>

</div>

</body>
</html>
